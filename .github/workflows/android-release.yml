name: Android Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'          # triggers on v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    name: Build & Deploy to Play Store
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / npm ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Copy web assets into www/ ─────────────────────────────────
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html script.js style.css www/
          [ -f act1.txt ] && cp act1.txt www/ || true
          [ -f game_description.txt ] && cp game_description.txt www/ || true

      # ── 4. Capacitor sync ────────────────────────────────────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 5. Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 6. Android SDK ───────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Decode Keystore ───────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks

      # ── 8. Decode Play Store JSON key ────────────────────────────────
      - name: Decode Play Store service account key
        run: |
          echo "${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}" | base64 --decode > ${{ github.workspace }}/play-store-key.json

      # ── 9. Ruby + Fastlane ───────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      # ── 10. Build & Deploy ───────────────────────────────────────────
      - name: Build & Deploy to Internal track
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY_FILE: ${{ github.workspace }}/play-store-key.json
        run: fastlane android deploy_internal

      # ── 11. Upload AAB as artifact (for manual inspection) ───────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
