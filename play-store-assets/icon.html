<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 512px;
    overflow: hidden;
    background: #000;
  }
  .icon {
    width: 512px; height: 512px;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
  }
  /* Radial glow background */
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  /* Scanline texture */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
  }
  /* Corner brackets */
  .bracket {
    position: absolute;
    width: 40px; height: 40px;
    border-color: rgba(0,229,255,0.4);
    border-style: solid;
  }
  .tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
  .tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
  .bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
  .br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

  /* Magnifying glass */
  .magnifier-wrap {
    position: relative;
    width: 180px; height: 180px;
    margin-bottom: 18px;
  }
  .lens-outer {
    width: 130px; height: 130px;
    border-radius: 50%;
    border: 10px solid #00e5ff;
    position: absolute;
    top: 0; left: 0;
    box-shadow:
      0 0 30px rgba(0,229,255,0.5),
      0 0 60px rgba(0,229,255,0.2),
      inset 0 0 20px rgba(0,229,255,0.1);
  }
  .lens-inner {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      rgba(0,229,255,0.15) 0%,
      rgba(0,229,255,0.05) 40%,
      transparent 70%
    );
    border: 1px solid rgba(0,229,255,0.2);
    position: absolute;
    top: 20px; left: 20px;
  }
  /* Eye inside lens */
  .eye {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 28px;
  }
  .eye-line {
    width: 50px; height: 28px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    border: 2px solid rgba(0,229,255,0.8);
    position: absolute;
    top: 0; left: 0;
    clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
  }
  .eye-line2 {
    width: 50px; height: 28px;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    border: 2px solid rgba(0,229,255,0.8);
    position: absolute;
    top: 0; left: 0;
    clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
  }
  .pupil {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #00e5ff;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px rgba(0,229,255,0.8);
  }
  /* Handle */
  .handle {
    width: 12px; height: 70px;
    background: linear-gradient(to bottom, #00e5ff, rgba(0,229,255,0.4));
    border-radius: 6px;
    position: absolute;
    bottom: 0; right: 20px;
    transform: rotate(45deg);
    transform-origin: top center;
    box-shadow: 0 0 10px rgba(0,229,255,0.4);
  }

  /* Title text */
  .title-wrap {
    text-align: center;
    z-index: 1;
  }
  .the {
    font-size: 13px;
    letter-spacing: 8px;
    color: rgba(0,229,255,0.7);
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    display: block;
    margin-bottom: 4px;
  }
  .title-main {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }
  .tagline {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(0,229,255,0.5);
    text-transform: uppercase;
    margin-top: 8px;
    display: block;
  }

  /* Thin horizontal rule */
  .rule {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,229,255,0.6), transparent);
    margin: 10px auto;
  }

  /* Dots decoration */
  .dots {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    justify-content: center;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(0,229,255,0.4);
  }
  .dot.active { background: #00e5ff; width: 6px; height: 6px; }
</style>
</head>
<body>
<div class="icon">
  <div class="glow"></div>
  <div class="scanlines"></div>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="magnifier-wrap">
    <div class="lens-outer"></div>
    <div class="lens-inner">
      <div class="eye">
        <div class="eye-line"></div>
        <div class="eye-line2"></div>
        <div class="pupil"></div>
      </div>
    </div>
    <div class="handle"></div>
  </div>

  <div class="title-wrap">
    <span class="the">The</span>
    <div class="rule"></div>
    <span class="title-main">Invisible<br>Detective</span>
    <div class="rule"></div>
    <span class="tagline">A Noir Mystery</span>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
</body>
</html>
