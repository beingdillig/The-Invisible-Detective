<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px; height: 512px;
    overflow: hidden;
    background: #080e10;
  }
  .icon {
    width: 512px; height: 512px;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 46% 44%,
      #0c1f26 0%,
      #080e10 65%);
  }
</style>
</head>
<body>
<div class="icon">
  <svg width="512" height="512" viewBox="0 0 512 512" fill="none"
       xmlns="http://www.w3.org/2000/svg">

    <defs>
      <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="eyeGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- All content scaled + centered with generous padding -->
    <g transform="translate(256,248) scale(0.72) translate(-256,-248)">

      <!-- ── LENS CIRCLE ── -->
      <!-- Subtle glow halo behind rim -->
      <circle cx="220" cy="208" r="155"
              stroke="rgba(0,229,255,0.12)" stroke-width="28" fill="none"/>
      <!-- Main rim — thin & clean -->
      <circle cx="220" cy="208" r="155"
              stroke="#00e5ff" stroke-width="5" fill="none"
              filter="url(#softGlow)"/>

      <!-- ── HANDLE ── -->
      <line x1="334" y1="334" x2="434" y2="434"
            stroke="rgba(0,229,255,0.15)" stroke-width="18" stroke-linecap="round"/>
      <line x1="334" y1="334" x2="434" y2="434"
            stroke="#00e5ff" stroke-width="5" stroke-linecap="round"
            filter="url(#softGlow)"/>

      <!-- ── EYE — minimal ── -->
      <!-- Upper lid -->
      <path d="M 148 208 Q 220 155 292 208"
            stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linecap="round"
            opacity="0.85"/>
      <!-- Lower lid -->
      <path d="M 148 208 Q 220 261 292 208"
            stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linecap="round"
            opacity="0.85"/>
      <!-- Iris ring -->
      <circle cx="220" cy="208" r="26"
              stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
      <!-- Pupil dot -->
      <circle cx="220" cy="208" r="10"
              fill="#00e5ff" filter="url(#eyeGlow)" opacity="0.95"/>
      <!-- Catchlight -->
      <circle cx="213" cy="201" r="3.5" fill="rgba(255,255,255,0.5)"/>

    </g>

  </svg>
</div>
</body>
</html>
